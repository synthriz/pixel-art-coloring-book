<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#cdc9c2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161514" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Paint by Number — pixel art coloring book" />
    <title>Coloring Pixelbook da Triz</title>
    <!-- fontchy -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- prevenir piscar do tema errado (fouc) — executa antes do app renderizar -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
        <!-- camada de fundo fixa — manchas radiais fornecem ao backdrop-filter algo p desfocar.
        deve ficar fora de #app para ficar atras de todo o conteudo do Vue. -->
    <div id="bg-layer" aria-hidden="true"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
